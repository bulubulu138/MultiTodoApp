name: Build and Release

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform == 'win' && 'Windows' || (matrix.arch == 'x64' && 'macOS Intel' || 'macOS Apple Silicon') }}
    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-latest  # Updated from macos-13 (retired)
            platform: mac
            arch: x64
            target_arch: x64
          - os: macos-latest  # Apple Silicon runners for arm64 builds
            platform: mac
            arch: arm64
            target_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # 禁用缓存，确保每次都是全新编译
          # cache: 'npm'
          # cache-dependency-path: '**/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci --ignore-scripts
          npm rebuild better-sqlite3
        shell: bash

      - name: Rebuild native modules for Electron
        run: |
          echo "Rebuilding native modules for Electron from source..."

          # 从 package.json 读取精确的 Electron 版本
          ELECTRON_VERSION=$(node -p "require('./package.json').devDependencies.electron.replace('^', '')")
          echo "Electron version: $ELECTRON_VERSION"

          if [ "${{ matrix.platform }}" = "mac" ]; then
            echo "Rebuilding for ${{ matrix.target_arch }} architecture..."
            npx electron-rebuild -f -w better-sqlite3 \
              -v $ELECTRON_VERSION \
              --prebuild-tag-prefix disabled \
              --arch=${{ matrix.target_arch }}
          else
            echo "Rebuilding for Windows..."
            npx electron-rebuild -f -w better-sqlite3 \
              -v $ELECTRON_VERSION \
              --prebuild-tag-prefix disabled
          fi

          echo "Checking build result..."
          ls -lh node_modules/better-sqlite3/build/Release/
        env:
          npm_config_msvs_version: ${{ matrix.platform == 'win' && '2019' || '' }}
        shell: bash

      - name: Verify native module architecture (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "=== Native Module Architecture Verification ==="
          if [ -f "node_modules/better-sqlite3/build/Release/better_sqlite3.node" ]; then
            echo "✅ Native module found"
            file node_modules/better-sqlite3/build/Release/better_sqlite3.node
            echo "Target architecture: ${{ matrix.target_arch }}"

            # Additional verification for architecture
            if [ "${{ matrix.target_arch }}" = "x64" ]; then
              echo "Verifying x64 architecture..."
              if file node_modules/better-sqlite3/build/Release/better_sqlite3.node | grep -q "x86_64"; then
                echo "✅ x64 architecture verification passed"
              else
                echo "❌ x64 architecture verification failed"
                exit 1
              fi
            elif [ "${{ matrix.target_arch }}" = "arm64" ]; then
              echo "Verifying arm64 architecture..."
              if file node_modules/better-sqlite3/build/Release/better_sqlite3.node | grep -q "arm64"; then
                echo "✅ arm64 architecture verification passed"
              else
                echo "❌ arm64 architecture verification failed"
                exit 1
              fi
            fi
          else
            echo "❌ Native module not found"
            exit 1
          fi
        shell: bash

      - name: Create macOS icons
        if: matrix.platform == 'mac'
        run: |
          echo "Creating macOS .icns file from PNG icons..."
          cd assets

          # 显示可用图标文件
          echo "Available icon files:"
          ls -la icon_*.png || echo "No icon files found"

          # 运行图标生成脚本
          python3 create_icns.py

          # 检查结果
          if [ -f "icon.icns" ]; then
            echo "✅ icon.icns created successfully"
            ls -la icon.icns

            # 增强验证
            file icon.icns
            echo "icon.icns file size: $(stat -f%z icon.icns) bytes"

            # 验证它是有效的ICNS文件
            if file icon.icns | grep -q "data"; then
              echo "✅ .icns file format validation passed"
            else
              echo "⚠️ .icns file format may be invalid"
            fi

            # 显示生成报告（如果存在）
            if [ -f "icon_generation_report.json" ]; then
              echo "📊 Generation report:"
              cat icon_generation_report.json
            fi
          else
            echo "❌ Failed to create icon.icns"
            echo "Available files in assets:"
            ls -la

            # 显示生成报告用于调试
            if [ -f "icon_generation_report.json" ]; then
              echo "📊 Generation report:"
              cat icon_generation_report.json
            fi

            exit 1
          fi
        shell: bash

      - name: Build application
        run: npm run build

      - name: Verify build output (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "Verifying build output structure..."

          # Check if icon.icns exists
          if [ -f "assets/icon.icns" ]; then
            echo "✅ icon.icns exists"
            file assets/icon.icns
          else
            echo "❌ icon.icns missing"
            exit 1
          fi

          # Check if build directory exists and has main.js
          if [ -f "dist/main/main.js" ]; then
            echo "✅ Main process built successfully"
            ls -la dist/main/
          else
            echo "❌ Main process build failed"
            exit 1
          fi

          # Check if renderer build exists
          if [ -d "dist/renderer" ] && [ "$(ls -A dist/renderer/)" ]; then
            echo "✅ Renderer process built successfully"
            ls -la dist/renderer/
          else
            echo "❌ Renderer process build failed"
            exit 1
          fi
        shell: bash

      - name: Package application (Windows)
        if: matrix.platform == 'win'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package application (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        run: npm run dist:mac -- --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Package application (macOS ARM64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: npm run dist:mac -- --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Verify app bundle structure (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "Verifying app bundle structure..."

          # Find the built app bundle
          APP_BUNDLE=$(find release -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found in release directory"
            ls -la release/
            exit 1
          fi

          echo "Found app bundle: $APP_BUNDLE"

          # Check app bundle structure
          CONTENTS_DIR="$APP_BUNDLE/Contents"
          REQUIRED_DIRS=("MacOS" "Resources" "Frameworks")
          REQUIRED_FILES=("Info.plist" "MacOS/MultiTodo")

          echo "Checking Contents directory structure..."
          if [ -d "$CONTENTS_DIR" ]; then
            echo "✅ Contents directory exists"
            ls -la "$CONTENTS_DIR"
          else
            echo "❌ Contents directory missing"
            exit 1
          fi

          # Check required directories
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$CONTENTS_DIR/$dir" ]; then
              echo "✅ $dir directory exists"
            else
              echo "❌ $dir directory missing"
              exit 1
            fi
          done

          # Check required files
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$CONTENTS_DIR/$file" ]; then
              echo "✅ $file exists"
              file "$CONTENTS_DIR/$file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

          # Check for icon resources
          if [ -f "$CONTENTS_DIR/Resources/icon.icns" ]; then
            echo "✅ icon.icns exists in Resources"
            file "$CONTENTS_DIR/Resources/icon.icns"
          else
            echo "❌ icon.icns missing from Resources"
            echo "Available Resources:"
            ls -la "$CONTENTS_DIR/Resources/" || echo "Resources directory not accessible"
          fi

          # Check code signature (even with null identity)
          echo "Checking code signature..."
          codesign -dv --verbose=4 "$APP_BUNDLE" || echo "Code signature check returned non-zero (expected for null identity)"

          echo "✅ App bundle verification completed"
        shell: bash

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: MultiTodo-Windows
          path: |
            release/*.exe
            release/*.exe.blockmap
          if-no-files-found: error

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: MultiTodo-${{ matrix.arch == 'x64' && 'macOS-Intel' || 'macOS-Apple-Silicon' }}
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 安装包下载

            ### Windows
            - `MultiTodo-*-x64-setup.exe` - Windows 安装包（适用于 Windows 10/11 64位）

            ### macOS
            - `MultiTodo-*-x64.dmg` - **Intel 芯片 Mac** 安装包（适用于 2019 年及早期的 Intel 处理器 Mac）
            - `MultiTodo-*-arm64.dmg` - **Apple Silicon Mac** 安装包（适用于 M1/M2/M3/M4 芯片的 Mac）

            **如何选择？**
            - 如果你不确定：点击屏幕左上角的 🍎 图标 → 选择"关于本机" → 查看"处理器"或"芯片"信息
            - Intel 芯片显示：Intel Core i5/i7/i9 等
            - Apple Silicon 显示：M1、M2、M3、M4 等

            ## 🎯 功能特性
            - ✅ 基于关键词的智能待办推荐
            - ✅ 中文分词与TF-IDF算法
            - ✅ 待办关系管理
            - ✅ 富文本编辑器
            - ✅ AI助手配置（支持Kimi/DeepSeek/豆包）
            - ✅ 跨平台支持

            ## 📝 更新日志
            查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细更新内容

            ## ⚠️ 注意事项
            - Windows用户首次安装可能需要允许SmartScreen
            - macOS用户需要在安全性偏好设置中允许运行
            - 首次使用建议在设置中执行"为所有待办生成关键词"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

