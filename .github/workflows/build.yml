name: Build and Release

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform == 'win' && 'Windows' || (matrix.arch == 'x64' && 'macOS Intel' || 'macOS Apple Silicon') }}
    runs-on: ${{ matrix.os }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-latest  # Updated from macos-13 (retired)
            platform: mac
            arch: x64
            target_arch: x64
          - os: macos-latest  # Apple Silicon runners for arm64 builds
            platform: mac
            arch: arm64
            target_arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          # 禁用缓存，确保每次都是全新编译
          # cache: 'npm'
          # cache-dependency-path: '**/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          npm cache clean --force
          npm ci --ignore-scripts
        shell: bash

      - name: Verify pure JavaScript architecture (no native modules)
        run: |
          echo "=== Pure JavaScript Architecture Verification ==="
          echo "✅ Using Markdown file storage - no native modules required"
          echo "Platform: ${{ matrix.platform }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "Electron version: $(node -p "require('./package.json').devDependencies.electron")"
          echo "✅ Architecture verification passed - pure JavaScript implementation"
        shell: bash

      - name: Create macOS icons with fallback
        if: matrix.platform == 'mac'
        run: |
          echo "Creating macOS .icns file from PNG icons..."
          cd assets

          # Verify required icon files
          echo "Verifying required icon files..."
          REQUIRED_SIZES=(512 256)
          for size in "${REQUIRED_SIZES[@]}"; do
            if [ ! -f "icon_${size}x${size}.png" ]; then
              echo "ERROR: Required icon_${size}x${size}.png missing"
              exit 1
            fi
          done
          echo "OK: All required icon files present"

          # Attempt Python icon generation first
          echo "Attempting Python icon generation..."
          if python3 create_icns.py 2>/dev/null && [ -f "icon.icns" ]; then
            echo "OK: Python script succeeded"
          else
            echo "WARN: Python script failed, using direct iconutil fallback"

            # Create iconset directory
            mkdir -p MultiTodo.iconset

            # Copy icon files with proper naming
            cp icon_16x16.png MultiTodo.iconset/icon_16x16.png
            cp icon_32x32.png MultiTodo.iconset/icon_16x16@2x.png
            cp icon_32x32.png MultiTodo.iconset/icon_32x32.png
            cp icon_64x64.png MultiTodo.iconset/icon_32x32@2x.png
            cp icon_128x128.png MultiTodo.iconset/icon_128x128.png
            cp icon_256x256.png MultiTodo.iconset/icon_128x128@2x.png
            cp icon_256x256.png MultiTodo.iconset/icon_256x256.png
            cp icon_512x512.png MultiTodo.iconset/icon_256x256@2x.png
            cp icon_512x512.png MultiTodo.iconset/icon_512x512.png
            cp icon_512x512.png MultiTodo.iconset/icon_512x512@2x.png

            # Convert to .icns
            iconutil -c icns MultiTodo.iconset -o icon.icns

            # Cleanup
            rm -rf MultiTodo.iconset
          fi

          # Validate generated file
          if [ ! -f "icon.icns" ]; then
            echo "ERROR: icon.icns generation failed"
            exit 1
          fi

          FILE_SIZE=$(stat -f%z icon.icns)
          if [ "$FILE_SIZE" -lt 1000 ]; then
            echo "ERROR: icon.icns too small (${FILE_SIZE} bytes), likely corrupted"
            exit 1
          fi

          echo "OK: icon.icns generated successfully (${FILE_SIZE} bytes)"
          file icon.icns
        shell: bash

      - name: Build application
        run: npm run build

      - name: Verify build output (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "Verifying build output structure..."

          # Check if icon.icns exists
          if [ -f "assets/icon.icns" ]; then
            echo "✅ icon.icns exists"
            file assets/icon.icns
          else
            echo "❌ icon.icns missing"
            exit 1
          fi

          # Check if build directory exists and has main.js
          if [ -f "dist/main/main.js" ]; then
            echo "✅ Main process built successfully"
            ls -la dist/main/
          else
            echo "❌ Main process build failed"
            exit 1
          fi

          # Check if renderer build exists
          if [ -d "dist/renderer" ] && [ "$(ls -A dist/renderer/)" ]; then
            echo "✅ Renderer process built successfully"
            ls -la dist/renderer/
          else
            echo "❌ Renderer process build failed"
            exit 1
          fi
        shell: bash

      - name: Package application (Windows)
        if: matrix.platform == 'win'
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Windows build output
        if: matrix.platform == 'win'
        run: |
          echo "=== Verifying Windows build output ==="

          # Check if release directory exists
          if [ ! -d "release" ]; then
            echo "❌ Release directory does not exist"
            exit 1
          fi

          echo "✅ Release directory exists"

          # List all files in release directory
          echo "📁 Contents of release directory:"
          ls -la release/

          # Check for .exe files
          echo ""
          echo "🔍 Searching for .exe files..."
          EXE_FILES=$(find release -name "*.exe" -type f)
          if [ -z "$EXE_FILES" ]; then
            echo "❌ No .exe files found in release directory"
            echo "🔍 All files in release:"
            find release -type f
            exit 1
          fi

          echo "✅ Found .exe files:"
          echo "$EXE_FILES"

          # Check for .blockmap files
          echo ""
          echo "🔍 Searching for .blockmap files..."
          BLOCKMAP_FILES=$(find release -name "*.blockmap" -type f)
          if [ -z "$BLOCKMAP_FILES" ]; then
            echo "⚠️ No .blockmap files found (this might be expected)"
          else
            echo "✅ Found .blockmap files:"
            echo "$BLOCKMAP_FILES"
          fi

          # Verify file sizes
          echo ""
          echo "📊 File sizes:"
          for file in $EXE_FILES; do
            if [ -f "$file" ]; then
              SIZE=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo "unknown")
              echo "  $(basename "$file"): $SIZE bytes"
            fi
          done

          echo ""
          echo "✅ Windows build verification completed"
        shell: bash

      - name: Package application (macOS x64)
        if: matrix.platform == 'mac' && matrix.arch == 'x64'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Package application (macOS ARM64)
        if: matrix.platform == 'mac' && matrix.arch == 'arm64'
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Verify app bundle structure (macOS)
        if: matrix.platform == 'mac'
        run: |
          echo "Verifying app bundle structure..."

          # Find the built app bundle
          APP_BUNDLE=$(find release -name "*.app" -type d | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "❌ No .app bundle found in release directory"
            ls -la release/
            exit 1
          fi

          echo "Found app bundle: $APP_BUNDLE"

          # Check app bundle structure
          CONTENTS_DIR="$APP_BUNDLE/Contents"
          REQUIRED_DIRS=("MacOS" "Resources" "Frameworks")
          REQUIRED_FILES=("Info.plist" "MacOS/MultiTodo")

          echo "Checking Contents directory structure..."
          if [ -d "$CONTENTS_DIR" ]; then
            echo "✅ Contents directory exists"
            ls -la "$CONTENTS_DIR"
          else
            echo "❌ Contents directory missing"
            exit 1
          fi

          # Check required directories
          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$CONTENTS_DIR/$dir" ]; then
              echo "✅ $dir directory exists"
            else
              echo "❌ $dir directory missing"
              exit 1
            fi
          done

          # Check required files
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$CONTENTS_DIR/$file" ]; then
              echo "✅ $file exists"
              file "$CONTENTS_DIR/$file"
            else
              echo "❌ $file missing"
              exit 1
            fi
          done

          # Check for icon resources
          if [ -f "$CONTENTS_DIR/Resources/icon.icns" ]; then
            echo "✅ icon.icns exists in Resources"
            file "$CONTENTS_DIR/Resources/icon.icns"
          else
            echo "❌ icon.icns missing from Resources"
            echo "Available Resources:"
            ls -la "$CONTENTS_DIR/Resources/" || echo "Resources directory not accessible"
          fi

          # Check code signature (even with null identity)
          echo "Checking code signature..."
          codesign -dv --verbose=4 "$APP_BUNDLE" || echo "Code signature check returned non-zero (expected for null identity)"

          echo "✅ App bundle verification completed"
        shell: bash

      - name: Verify macOS build artifacts
        if: matrix.platform == 'mac'
        run: |
          echo "=== Verifying macOS build artifacts ==="

          # Check if release directory exists
          if [ ! -d "release" ]; then
            echo "❌ Release directory does not exist"
            exit 1
          fi

          echo "✅ Release directory exists"

          # List all files in release directory
          echo "📁 Contents of release directory:"
          ls -la release/

          # Check for .dmg files
          echo ""
          echo "🔍 Searching for .dmg files..."
          DMG_FILES=$(find release -name "*.dmg" -type f)
          if [ -z "$DMG_FILES" ]; then
            echo "❌ No .dmg files found in release directory"
            echo "🔍 All files in release:"
            find release -type f
            exit 1
          fi

          echo "✅ Found .dmg files:"
          echo "$DMG_FILES"

          # Check for .blockmap files
          echo ""
          echo "🔍 Searching for .blockmap files..."
          BLOCKMAP_FILES=$(find release -name "*.blockmap" -type f)
          if [ -z "$BLOCKMAP_FILES" ]; then
            echo "⚠️ No .blockmap files found (this might be expected)"
          else
            echo "✅ Found .blockmap files:"
            echo "$BLOCKMAP_FILES"
          fi

          # Verify file sizes
          echo ""
          echo "📊 File sizes:"
          for file in $DMG_FILES; do
            if [ -f "$file" ]; then
              SIZE=$(stat -f%z "$file" 2>/dev/null || echo "unknown")
              echo "  $(basename "$file"): $SIZE bytes"
            fi
          done

          echo ""
          echo "✅ macOS build artifacts verification completed"
        shell: bash

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: MultiTodo-Windows-x64
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: warn
          overwrite: false

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: MultiTodo-${{ matrix.arch == 'x64' && 'macOS-Intel' || 'macOS-Apple-Silicon' }}
          path: |
            release/*.dmg
            release/*.blockmap
          if-no-files-found: warn
          overwrite: false

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 📦 安装包下载

            ### Windows
            - `MultiTodo-*-x64-setup.exe` - Windows 安装包（适用于 Windows 10/11 64位）

            ### macOS
            - `MultiTodo-*-x64.dmg` - **Intel 芯片 Mac** 安装包（适用于 2019 年及早期的 Intel 处理器 Mac）
            - `MultiTodo-*-arm64.dmg` - **Apple Silicon Mac** 安装包（适用于 M1/M2/M3/M4 芯片的 Mac）

            **如何选择？**
            - 如果你不确定：点击屏幕左上角的 🍎 图标 → 选择"关于本机" → 查看"处理器"或"芯片"信息
            - Intel 芯片显示：Intel Core i5/i7/i9 等
            - Apple Silicon 显示：M1、M2、M3、M4 等

            ## 🎯 功能特性
            - ✅ **Markdown 文件存储** - 纯文本格式，易于管理和备份
            - ✅ 基于关键词的智能待办推荐
            - ✅ 中文分词与TF-IDF算法
            - ✅ 待办关系管理
            - ✅ 富文本编辑器
            - ✅ AI助手配置（支持Kimi/DeepSeek/豆包）
            - ✅ 流程图可视化编辑
            - ✅ 跨平台支持
            - ✅ 无原生模块依赖，构建更快速稳定

            ## 📝 更新日志
            查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细更新内容

            ## ⚠️ 注意事项
            - Windows用户首次安装可能需要允许SmartScreen
            - macOS用户需要在安全性偏好设置中允许运行
            - 首次使用建议在设置中执行"为所有待办生成关键词"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

